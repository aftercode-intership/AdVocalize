networks:
  vocalize-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  traefik_data:
    driver: local
  hf_cache:      
    driver: local
  camel_data:    
    driver: local