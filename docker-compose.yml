services:
  # ============================================================================
  # CORE INFRASTRUCTURE
  # ============================================================================

  # PostgreSQL Database with pgvector extension
  postgres:
    image: postgres:16-alpine
    container_name: vocalize-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-vocalize}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
      POSTGRES_DB: ${DB_NAME:-vocalize_db}
      # pgvector extension will be created automatically via SQL init
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/sql:/docker-entrypoint-initdb.d
    networks:
      - vocalize-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vocalize}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: vocalize-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}

    volumes:
      - redis_data:/data
    networks:
      - vocalize-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: vocalize-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console
    volumes:
      - minio_data:/data
    networks:
      - vocalize-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.minio.rule: "Host(`minio.localhost`)"
      traefik.http.services.minio.loadbalancer.server.port: "9001"
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # OBSERVABILITY & LOGGING
  # ============================================================================

  # Loki (Log Aggregation)
  loki:
    image: grafana/loki:latest
    container_name: vocalize-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - vocalize-network
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.loki.rule: "Host(`loki.localhost`)"
      traefik.http.services.loki.loadbalancer.server.port: "3100"
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Promtail (Log Shipping to Loki)
  promtail:
    image: grafana/promtail:latest
    container_name: vocalize-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/promtail-config.yml:/etc/promtail/config.yml
    networks:
      - vocalize-network
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    labels:
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: vocalize-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - vocalize-network
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.prometheus.rule: "Host(`prometheus.localhost`) || PathPrefix(`/prometheus`)"
      traefik.http.services.prometheus.loadbalancer.server.port: "9090"
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Grafana (Visualization & Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: vocalize-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    networks:
      - vocalize-network
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.grafana.rule: "Host(`grafana.localhost`)"
      traefik.http.services.grafana.loadbalancer.server.port: "3000"
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # API GATEWAY & REVERSE PROXY
  # ============================================================================

  # Traefik (API Gateway & Reverse Proxy)
  traefik:
    image: traefik:v2.10
    container_name: vocalize-traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=vocalize-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Dashboard at http://traefik.localhost:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik_data:/var/lib/traefik
      - ./infra/traefik:/traefik:ro
    networks:
      - vocalize-network
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.http.routers.dashboard.rule: "Host(`traefik.localhost`) || PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      traefik.http.routers.dashboard.service: "api@internal"
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

