 # Script Generation Service (Python/FastAPI)
  # Uncomment and configure when ready
  script-gen:
    build:
      context: ./services/script-gen
      dockerfile: Dockerfile
      # Cache build layers — only rebuilds if requirements.txt or code changes
      cache_from:
        - vocalize-script-gen:latest
    image: vocalize-script-gen:latest
    container_name: vocalize-script-gen
    environment:
      # GLM API key from your .env file
      GLM_API_KEY: ${NVIDIA_API_KEY}
      # ✅ FIXED: model name matches ZhipuAI API (was glm-flash-4.7 in config.py)
      GLM_MODEL: ${GLM_MODEL:-z-ai/glm-5.1}
      GLM_BASE_URL: ${GLM_BASE_URL:-GLM_BASE_URL=https://integrate.api.nvidia.com/v1/chat/completions}
# Redis for caching generated scripts (avoids re-generating the same input)
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: 8001
    ports:
      - "8001:8001"
    networks:
      - vocalize-network
    depends_on:
      redis:
        condition: service_healthy      # Wait until Redis is actually ready
      postgres:
        condition: service_healthy      # Wait until DB is ready (for future DB writes)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      # start_period is long because the HuggingFace model download can take ~2 min
      # on first run (subsequent runs use Docker volume cache)
      start_period: 120s
      retries: 3
    # Volume to cache the HuggingFace model weights between restarts
    # Without this, the model re-downloads every time the container restarts
    volumes:
      - hf_cache:/root/.cache/huggingface
      - camel_data:/root/camel_tools
    restart: unless-stopped
    labels:
      logging: "promtail"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # TTS Service (Python/FastAPI)
  # Uncomment and configure when ready
  tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    image: vocalize-tts:latest
    container_name: vocalize-tts
    environment:
# Redis for job queue
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      # MinIO for audio storage
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      MINIO_BUCKET_AUDIO: vocalize-audio
      MINIO_USE_SSL: "false"
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - vocalize-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

